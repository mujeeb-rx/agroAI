[functions]
  directory = "netlify/functions"

[[redirects]]
  # Proxy all API requests to the Netlify serverless function
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  # Redirect all other routes to index.html for React Router (Single Page App)
  from = "/*"
  to = "/index.html"
  status = 200
